<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Quiz Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface-2: #1f1f1f;
    --border: #2a2a2a;
    --accent: #c8ff00;
    --accent-dim: rgba(200, 255, 0, 0.12);
    --text: #f0f0f0;
    --text-muted: #888;
    --radius: 12px;
  }

  html {
    height: 100%;
  }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 70vw;
    height: 70vw;
    background: radial-gradient(circle, rgba(200,255,0,0.04) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -15%;
    width: 55vw;
    height: 55vw;
    background: radial-gradient(circle, rgba(100,80,255,0.05) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 520px;
    margin: auto;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-dim);
    border: 1px solid rgba(200,255,0,0.25);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
    margin-bottom: 20px;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  h1 span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 36px;
    line-height: 1.5;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  input[type="text"],
  input[type="number"] {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 13px 16px;
    margin-bottom: 20px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]::placeholder,
  input[type="number"]::placeholder {
    color: #444;
  }

  input[type="text"]:focus,
  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,255,0,0.1);
  }

  /* Remove number input arrows */
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
  }

  button[type="submit"] {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #0d0d0d;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.02em;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }

  button[type="submit"]:hover {
    background: #d9ff33;
    box-shadow: 0 0 24px rgba(200,255,0,0.3);
    transform: translateY(-1px);
  }

  button[type="submit"]:active {
    transform: translateY(0);
  }

  .result {
    margin-top: 28px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(200,255,0,0.05);
  }

  .result-header span {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .result-body {
    padding: 18px 20px;
    font-size: 13px;
    line-height: 1.8;
    color: #ccc;
    white-space: pre-wrap;
    word-break: break-word;
  }
</style>
</head>
<body>
<div class="container">
  <div class="badge">AI-Powered</div>
  <h1>Quiz<br><span>Generator</span></h1>
  <p class="subtitle">Enter a topic and question count to generate a custom multiple-choice quiz instantly.</p>
  <hr class="divider">

  <form action="/generate" method="post">
    <label for="topic">Topic</label>
    <input type="text" id="topic" name="topic" placeholder="e.g. Python, World War II, Quantum Physics" required>

    <label for="num">Number of Questions</label>
    <input type="number" id="num" name="num" placeholder="e.g. 5" min="1" max="20" required>

    <button type="submit">Generate Quiz →</button>
  </form>

  {% if mcq %}
  <div class="result">
    <div class="result-header">
      <span>Generated MCQ</span>
    </div>
    <div class="result-body">{{ mcq }}</div>
  </div>
  {% endif %}
</div>
</body>
</html>
